<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任意门 · 下一站去哪里？</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FFF8E7;
  --pink: #F4A7B9;
  --pink-deep: #E893A6;
  --pink-dark: #D47A8E;
  --brown: #5D4037;
  --brown-light: #8D6E63;
  --gold: #F9C74F;
  --gold-dark: #E6B33D;
  --mint: #7EC8A0;
  --mint-dark: #5DAF82;
  --white: #FFFBf0;
  --door-w: 280px;
  --door-h: 420px;
  --door-border: 14px;
}

body {
  font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  background-image:
    radial-gradient(circle at 15% 20%, #FFF3D6 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, #FFE8E0 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, #FFF8E7 0%, transparent 70%);
}

/* ── floating decorations ── */
.deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation: float 6s ease-in-out infinite;
}
.deco:nth-child(2) { animation-delay: -2s; animation-duration: 7s; }
.deco:nth-child(3) { animation-delay: -4s; animation-duration: 5.5s; }
.deco:nth-child(4) { animation-delay: -1s; animation-duration: 8s; }
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-18px) rotate(3deg); }
  66% { transform: translateY(10px) rotate(-2deg); }
}

/* ── main container ── */
.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 20px;
}

/* ── floor ── */
.floor {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 22%;
  background: linear-gradient(180deg, #F5E6D3 0%, #EDD7C1 30%, #E0C9AD 100%);
  z-index: 0;
  border-top: 3px dashed #D4B896;
}
.floor::before {
  content: '';
  position: absolute;
  top: 8px; left: 10%; right: 10%;
  height: 2px;
  background: repeating-linear-gradient(90deg, #D4B896 0px, #D4B896 40px, transparent 40px, transparent 80px);
}

/* ── title ── */
.title {
  font-size: 2rem;
  color: var(--brown);
  letter-spacing: 0.08em;
  text-shadow: 2px 2px 0 rgba(244,167,185,0.3);
  text-align: center;
  line-height: 1.5;
}
.title .dorayaki {
  display: inline-block;
  animation: bounce-dorayaki 1.2s ease-in-out infinite;
}
@keyframes bounce-dorayaki {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ── portal scene ── */
.portal-scene {
  perspective: 900px;
  perspective-origin: center center;
  width: calc(var(--door-w) + var(--door-border) * 2 + 20px);
  height: calc(var(--door-h) + var(--door-border) * 2 + 10px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.portal-stage {
  position: relative;
  width: calc(var(--door-w) + var(--door-border) * 2);
  height: calc(var(--door-h) + var(--door-border) * 2);
  transform-style: preserve-3d;
}

/* ── door frame (static outer) ── */
.door-frame {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, #F8C5D0 0%, #F0A0B5 40%, #E893A6 100%);
  border-radius: 20px 20px 16px 16px;
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,0.4),
    inset 0 -4px 12px rgba(0,0,0,0.08),
    0 8px 30px rgba(180,120,130,0.35),
    4px 6px 0 rgba(210,130,145,0.5);
  border: 3px solid #D47A8E;
}

/* ── doorway (opening, revealed when door opens) ── */
.doorway {
  position: absolute;
  inset: var(--door-border);
  background: radial-gradient(ellipse at center, #FFF3D6 0%, #FFE8C0 30%, #F5D5A0 60%, #E8C080 100%);
  border-radius: 8px 8px 4px 4px;
  overflow: hidden;
  z-index: 1;
}
/* portal vortex inside doorway */
.doorway::before {
  content: '';
  position: absolute;
  inset: -30%;
  background: conic-gradient(
    from 0deg,
    transparent 0deg, rgba(255,255,255,0.5) 30deg,
    rgba(249,199,79,0.4) 60deg, transparent 90deg,
    transparent 180deg, rgba(255,255,255,0.4) 210deg,
    rgba(249,199,79,0.3) 240deg, transparent 270deg,
    transparent 360deg
  );
  animation: vortex-spin 8s linear infinite;
}
@keyframes vortex-spin {
  to { transform: rotate(360deg); }
}

/* ── door leaf (the actual door that swings open) ── */
.door-leaf {
  position: absolute;
  inset: var(--door-border);
  background: linear-gradient(175deg, #FCD0DA 0%, #F4A7B9 30%, #EC96AA 60%, #E893A6 100%);
  border-radius: 8px 8px 4px 4px;
  z-index: 10;
  transform-origin: left center;
  transform: rotateY(0deg);
  transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow:
    inset 2px 0 12px rgba(255,255,255,0.35),
    inset -3px 0 10px rgba(0,0,0,0.06),
    2px 0 12px rgba(0,0,0,0.1);
  cursor: default;
}
.door-leaf.open {
  transform: rotateY(-118deg);
  transition: transform 0.75s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.door-leaf.closing {
  transform: rotateY(0deg);
  transition: transform 0.55s cubic-bezier(0.6, 0, 0.8, 1);
}

/* door panels (decorative inset rectangles) */
.door-panel {
  position: absolute;
  left: 14px; right: 14px;
  border-radius: 4px;
  border: 2px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.08);
}
.door-panel.top { top: 22px; height: 120px; }
.door-panel.bottom { bottom: 50px; height: 160px; }

/* round window */
.door-window {
  position: absolute;
  top: 50px; left: 50%;
  transform: translateX(-50%);
  width: 78px; height: 78px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #FFFEF9 0%, #E8E0D0 40%, #D4C8B0 100%);
  border: 4px solid #D47A8E;
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,0.7),
    inset 0 -2px 4px rgba(0,0,0,0.08),
    0 0 0 3px rgba(255,255,255,0.25);
  z-index: 2;
}
.door-window::after {
  content: '';
  position: absolute;
  top: 12%; left: 22%;
  width: 22px; height: 10px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  transform: rotate(-20deg);
}

/* door knob */
.door-knob {
  position: absolute;
  right: 18px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #FFE680 0%, #F9C74F 50%, #D4A030 100%);
  box-shadow: 0 2px 6px rgba(0,0,0,0.15), 0 0 0 3px rgba(180,120,0,0.15);
  z-index: 3;
}

/* ── destination card (inside doorway) ── */
.destination-card {
  position: absolute;
  inset: 18px;
  z-index: 2;
  background: var(--white);
  border-radius: 10px;
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 6px;
  opacity: 0;
  transform: scale(0.3) translateZ(-20px);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  box-shadow:
    0 4px 20px rgba(0,0,0,0.1),
    inset 0 1px 0 rgba(255,255,255,0.8);
  border: 2px solid #F0E0D0;
  overflow-y: auto;
}
.destination-card.visible {
  opacity: 1;
  transform: scale(1) translateZ(0);
  pointer-events: auto;
}
.destination-card.hiding {
  opacity: 0;
  transform: scale(0.6) translateZ(-30px);
  transition: all 0.3s ease-in;
}

.card-emoji {
  font-size: 2.8rem;
  line-height: 1;
  animation: emoji-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes emoji-pop {
  0% { transform: scale(0) rotate(-30deg); opacity: 0; }
  60% { transform: scale(1.3) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); }
}
.card-name {
  font-size: 1.5rem;
  color: var(--brown);
  letter-spacing: 0.05em;
}
.card-province {
  font-size: 0.85rem;
  color: var(--brown-light);
  background: #FFF3D6;
  padding: 2px 12px;
  border-radius: 20px;
}
.card-season {
  font-size: 0.82rem;
  color: var(--mint-dark);
}
.card-desc {
  font-size: 0.9rem;
  color: var(--brown);
  line-height: 1.5;
  margin-top: 2px;
  font-style: italic;
}
.card-tip {
  font-size: 0.78rem;
  color: var(--brown-light);
  background: #FFF9E6;
  border-radius: 8px;
  padding: 6px 10px;
  margin-top: 4px;
  border: 1px dashed #E8D5B0;
}
.card-tip::before { content: '💡 '; }

/* ── buttons ── */
.btn-group {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  z-index: 2;
}

.btn {
  font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 1.15rem;
  padding: 14px 36px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.25s ease;
  position: relative;
  outline: none;
}
.btn:active { transform: scale(0.94); }

.btn-random {
  background: var(--pink);
  color: white;
  box-shadow:
    0 6px 0 var(--pink-dark),
    0 8px 20px rgba(232,147,166,0.4);
  border: 2px solid var(--pink-deep);
}
.btn-random:hover {
  background: #F8B8C8;
  transform: translateY(-2px);
  box-shadow:
    0 8px 0 var(--pink-dark),
    0 12px 25px rgba(232,147,166,0.5);
}
.btn-random:active {
  transform: translateY(3px);
  box-shadow:
    0 3px 0 var(--pink-dark),
    0 4px 10px rgba(232,147,166,0.3);
}

.btn-confirm {
  background: var(--mint);
  color: white;
  box-shadow:
    0 6px 0 var(--mint-dark),
    0 8px 20px rgba(126,200,160,0.35);
  border: 2px solid var(--mint-dark);
  display: none;
}
.btn-confirm:hover {
  background: #8FD4AC;
  transform: translateY(-2px);
  box-shadow:
    0 8px 0 var(--mint-dark),
    0 12px 25px rgba(126,200,160,0.45);
}
.btn-confirm:active {
  transform: translateY(3px);
  box-shadow:
    0 3px 0 var(--mint-dark),
    0 4px 10px rgba(126,200,160,0.25);
}

/* ── encouragement ── */
.encouragement {
  font-size: 1rem;
  color: var(--brown-light);
  text-align: center;
  min-height: 28px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.5s ease;
  max-width: 340px;
  line-height: 1.6;
}
.encouragement.show {
  opacity: 1;
  transform: translateY(0);
}

/* ── blessing overlay ── */
.blessing-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,248,231,0.95);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 30px;
  text-align: center;
}
.blessing-overlay.show {
  display: flex;
  animation: fade-in 0.5s ease;
}
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.blessing-emoji {
  font-size: 4rem;
  animation: emoji-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.blessing-title {
  font-size: 2rem;
  color: var(--brown);
}
.blessing-text {
  font-size: 1.1rem;
  color: var(--brown-light);
  max-width: 400px;
  line-height: 1.8;
}
.blessing-dest {
  font-size: 1.4rem;
  color: var(--pink-deep);
  background: #FFF0F3;
  padding: 8px 24px;
  border-radius: 30px;
  border: 2px dashed var(--pink);
}
.btn-restart {
  font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 1rem;
  padding: 12px 30px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  background: var(--gold);
  color: var(--brown);
  box-shadow: 0 4px 0 var(--gold-dark), 0 6px 15px rgba(249,199,79,0.4);
  border: 2px solid var(--gold-dark);
  transition: all 0.2s ease;
}
.btn-restart:hover { transform: translateY(-2px); }
.btn-restart:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--gold-dark); }

/* ── sparkles ── */
.sparkle {
  position: fixed;
  pointer-events: none;
  z-index: 50;
  font-size: 1.2rem;
  animation: sparkle-fly 1.2s ease-out forwards;
}
@keyframes sparkle-fly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
}

/* ── responsive ── */
@media (max-width: 600px) {
  :root {
    --door-w: 200px;
    --door-h: 310px;
    --door-border: 10px;
  }
  .title { font-size: 1.4rem; }
  .btn { font-size: 1rem; padding: 12px 28px; }
  .destination-card { padding: 14px 10px; gap: 4px; }
  .card-emoji { font-size: 2rem; }
  .card-name { font-size: 1.2rem; }
  .card-desc { font-size: 0.8rem; }
  .card-tip { font-size: 0.72rem; }
  .door-window { width: 56px; height: 56px; top: 38px; }
  .door-panel.top { height: 80px; }
  .door-panel.bottom { height: 110px; bottom: 38px; }
  .door-knob { width: 14px; height: 14px; right: 12px; }
}
</style>
</head>

</div>

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let clickCount = 0;
let currentDest = null;
let isAnimating = false;
let doorOpen = false;
const recentIndices = [];
const MAX_RECENT = 7;

const encouragements = [
  "世界很大，哪个地方都是一次新的体验 ✨",
  "也许不是最好的，但一定是最特别的 🌸",
  "旅行的意义不在目的地，而在路上 🚶",
  "你已经看了这么多了，不如就选一个出发吧！",
  "犹豫的时候，第一个往往就是最好的 🎯",
  "脚步到达不了的地方，心可以先到。但心到了，脚也就快了 🌈",
];

const blessings = [
  "愿你一路平安，遇见最美的风景，也遇见最好的自己。",
  "旅途愉快！记得拍很多照片，吃很多好吃的，然后平安回来。",
  "去吧！这个世界比你想象的更温柔，也比你想象的更精彩。",
  "每一段旅程都是一次成长，希望你带着满满的故事回来。",
  "祝你遇到好天气、好风景、好心人，还有好吃的！",
  "出发吧！未知的路上，藏着生活给你的惊喜。",
];

// ═══════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════
const doorLeaf = document.getElementById('doorLeaf');
const destCard = document.getElementById('destCard');
const btnRandom = document.getElementById('btnRandom');
const btnConfirm = document.getElementById('btnConfirm');
const encouragementEl = document.getElementById('encouragement');
const blessingOverlay = document.getElementById('blessingOverlay');
const blessingDest = document.getElementById('blessingDest');
const blessingText = document.getElementById('blessingText');

// ═══════════════════════════════════════
//  FUNCTIONS
// ═══════════════════════════════════════

function getRandomDest() {
  let idx;
  let tries = 0;
  do {
    idx = Math.floor(Math.random() * destinations.length);
    tries++;
    if (tries > 100) break; // safety valve
  } while (recentIndices.includes(idx));

  recentIndices.push(idx);
  if (recentIndices.length > MAX_RECENT) recentIndices.shift();

  return destinations[idx];
}

function updateCard(dest) {
  document.getElementById('cardEmoji').textContent = dest.emoji;
  document.getElementById('cardName').textContent = dest.name;
  document.getElementById('cardProvince').textContent = '📍 ' + dest.province;
  document.getElementById('cardSeason').textContent = '🕐 最佳季节：' + dest.season;
  document.getElementById('cardDesc').textContent = dest.desc;
  document.getElementById('cardTip').textContent = dest.tip;
  // reset emoji animation
  const emojiEl = document.getElementById('cardEmoji');
  emojiEl.style.animation = 'none';
  emojiEl.offsetHeight; // reflow
  emojiEl.style.animation = 'emoji-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both';
}

function spawnSparkles(x, y) {
  const emojis = ['✨','⭐','💫','🌟','💖','🌸','🎀'];
  for (let i = 0; i < 8; i++) {
    const sparkle = document.createElement('span');
    sparkle.className = 'sparkle';
    sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    sparkle.style.left = x + 'px';
    sparkle.style.top = y + 'px';
    sparkle.style.setProperty('--sx', (Math.random() - 0.5) * 200 + 'px');
    sparkle.style.setProperty('--sy', (Math.random() - 0.5) * 200 - 40 + 'px');
    sparkle.style.animationDuration = (0.8 + Math.random() * 1) + 's';
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 1500);
  }
}

async function openDoor() {
  if (isAnimating) return;
  isAnimating = true;

  clickCount++;
  const dest = getRandomDest();
  currentDest = dest;

  // Get button position for sparkles
  const btnRect = btnRandom.getBoundingClientRect();
  const sparkX = btnRect.left + btnRect.width / 2;
  const sparkY = btnRect.top + btnRect.height / 2;

  if (doorOpen) {
    // Door is open → hide card, close door, then reopen
    destCard.classList.remove('visible');
    destCard.classList.add('hiding');

    await sleep(350);

    doorLeaf.classList.add('closing');
    doorLeaf.classList.remove('open');

    await sleep(600);

    // update card while door is closed
    updateCard(dest);
    destCard.classList.remove('hiding');

    doorLeaf.classList.remove('closing');
    // force reflow
    doorLeaf.offsetHeight;

    // open door again
    doorLeaf.classList.add('open');

    await sleep(400);

    destCard.classList.add('visible');
    spawnSparkles(sparkX, sparkY);
  } else {
    // First time → update card, then open door
    updateCard(dest);

    await sleep(150);

    doorLeaf.classList.add('open');

    await sleep(450);

    destCard.classList.add('visible');
    doorOpen = true;
    btnConfirm.style.display = 'inline-block';
    btnRandom.textContent = '🔄 再换一个';
  }

  // Show encouragement after 5 clicks
  if (clickCount >= 5) {
    const msg = encouragements[Math.floor(Math.random() * encouragements.length)];
    encouragementEl.textContent = msg;
    encouragementEl.classList.add('show');
  }

  isAnimating = false;
}

function lockItIn() {
  if (isAnimating || !currentDest) return;
  isAnimating = true;

  // spawn sparkles everywhere!
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      spawnSparkles(
        Math.random() * window.innerWidth,
        Math.random() * window.innerHeight * 0.6
      );
    }, i * 300);
  }

  const blessing = blessings[Math.floor(Math.random() * blessings.length)];
  blessingDest.textContent = '🏁 ' + currentDest.name + ' · ' + currentDest.province;
  blessingText.textContent = blessing;

  setTimeout(() => {
    blessingOverlay.classList.add('show');
  }, 600);

  isAnimating = false;
}

function startOver() {
  blessingOverlay.classList.remove('show');
  clickCount = 0;
  currentDest = null;
  doorOpen = false;
  recentIndices.length = 0;
  isAnimating = false;

  doorLeaf.classList.remove('open');
  destCard.classList.remove('visible', 'hiding');
  btnConfirm.style.display = 'none';
  btnRandom.textContent = '✨ 开启穿越';
  encouragementEl.classList.remove('show');
  encouragementEl.textContent = '';
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ═══════════════════════════════════════
//  KEYBOARD SHORTCUT
// ═══════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (blessingOverlay.classList.contains('show')) {
    if (e.key === 'Enter' || e.key === ' ') startOver();
    return;
  }
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    openDoor();
  }
  if ((e.key === 'y' || e.key === 'Y') && doorOpen) {
    e.preventDefault();
    lockItIn();
  }
});
</script>

</html>
